<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid layout</title>
    <style>
        .container{
            display: grid;
            /* grid-template-columns: 150px 150px 300px; */
            /* grid-template-columns: repeat(3, 250px); */
            /* grid-template-columns: repeat(3, 2fr); */
            /* grid-template-columns: repeat(4,1fr); */
            grid-template-columns: repeat(3,1fr)2fr 4fr;

            gap: 20px;
        }
        .box{
            border: 1px solid saddlebrown;
            font-size: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">box-1</div>
        <div class="box">box-2</div>
        <div class="box">box-3</div>
        <div class="box">box-4</div>
        <div class="box">box-5</div>
        <div class="box">box-6</div>
        <div class="box">box-7</div>
        <div class="box">box-8</div>
        <div class="box">box-9</div>
        <div class="box">box-10</div>
        <div class="box">box-11</div>
        <div class="box">box-12</div>
        <div class="box">box-13</div>
        <div class="box">box-14</div>
        <div class="box">box-15</div>
        <div class="box">box-16</div>
        <div class="box">box-17</div>
        <div class="box">box-18</div>
        <div class="box">box-19</div>
        <div class="box">box-20</div>
        <div class="box">box-21</div>
        <div class="box">box-22</div>
    </div>
</body>
</html>
